{% extends 'attendance/base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="row justify-content-center w-100">
        <div class="col-md-5">
            <div class="glass-panel p-4">
                <div class="text-center mb-4">
                    <h2 class="text-neon-blue"><i class="fas fa-user-astronaut me-2"></i>IDENTIFICATION</h2>
                </div>
                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-info">IDENTIFIANT</label>
                            <input type="text" name="username" class="form-control glass-input" placeholder="Entrez votre ID" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-info">MOT DE PASSE</label>
                            <input type="password" name="password" class="form-control glass-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-neon w-100 py-2">ACCÉDER AU SYSTÈME</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
