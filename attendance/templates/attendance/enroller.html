{% extends 'attendance/base.html' %}

{% block title %}
Enrolement d'un etudiant
{% endblock %}

{% block content %}

<style>
/* Inputs */
.glass-input {
    background: rgba(0,0,0,0.5);
    color: #ffffff !important;
    border: 1px solid #00ffff;
}

/* Placeholder */
.glass-input::placeholder {
    color: #cccccc !important;
}

/* Select */
.glass-select {
    background: rgba(0,0,0,0.6) !important;
    color: #ffffff !important;
    border: 1px solid #00ffff;
}

/* Options dropdown */
.glass-select option {
    background: #ffffff;
    color: #000000;
}

/* Effet focus */
.glass-input:focus, .glass-select:focus {
    box-shadow: 0 0 10px #00ffff;
}
</style>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-fingerprint me-2"></i>NOUVEL ENROLEMENT</h2>
        <a href="{% url 'attendance:dashboard' %}" class="btn btn-neon-red btn-sm">Annuler</a>
    </div>

    <div class="glass-panel p-4">

        <form id="enrolForm" method="POST">
            {% csrf_token %}

            <div class="row">

                <!-- FORMULAIRE -->
                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label text-info">Matricule</label>
                        <input type="text" name="matricule" id="matriculeInput"
                               class="form-control glass-input"
                               readonly placeholder="Genere automatiquement">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-info">Filiere</label>
                        <select name="filiere" id="filiereSelect" class="form-select glass-select" required>
                            <option value="">-- Selectionner --</option>
                            {% for f in filieres %}
                                <option value="{{ f.id }}">{{ f.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-info">Nom</label>
                        <input type="text" name="nom" class="form-control glass-input" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-info">Annee</label>
                        <select name="annee" id="anneeSelect" class="form-select glass-select" required>
                            <option value="">-- Selectionner --</option>
                            {% for a in annees %}
                                <option value="{{ a.id }}">{{ a.filiere.nom }} - Annee {{ a.numero }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-info">Groupe</label>
                        <select name="groupe" class="form-select glass-select">
                            <option value="">-- Aucun --</option>
                            {% for g in groupes %}
                                <option value="{{ g.id }}">{{ g.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>

                </div>

                <!-- WEBCAM -->
                <div class="col-md-6 text-center">

                    <label class="form-label text-neon-blue mb-3">CAPTURE BIOMETRIQUE</label>

                    <div class="position-relative">
                        <video id="video" width="100%" autoplay class="border border-info rounded"></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                    </div>

                    <button type="button" id="captureBtn" class="btn btn-neon mt-3">
                        <i class="fas fa-camera me-2"></i>CAPTURER VISAGE
                    </button>

                    <input type="hidden" name="photo" id="photoData">

                </div>

            </div>

            <button type="submit" class="btn btn-neon-purple w-100 py-3 fw-bold mt-4">
                VALIDER L'ENREGISTREMENT
            </button>

        </form>

    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const photoInput = document.getElementById('photoData');

    const matriculeInput = document.getElementById('matriculeInput');
    const filiereSelect = document.getElementById('filiereSelect');
    const anneeSelect = document.getElementById('anneeSelect');

    // Supprimer accents
    function removeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // Webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => video.srcObject = stream)
        .catch(err => alert("Erreur camera : " + err));

    // Capture
    captureBtn.onclick = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        photoInput.value = canvas.toDataURL('image/jpeg');
        alert('Photo capturee !');
    };

    // Matricule
    function updateMatricule() {

        if (!filiereSelect.value || !anneeSelect.value) {
            matriculeInput.value = '';
            return;
        }

        let filiereText = filiereSelect.options[filiereSelect.selectedIndex].text;
        let anneeText = anneeSelect.options[anneeSelect.selectedIndex].text;

        filiereText = removeAccents(filiereText);

        const filiereCode = filiereText.substring(0, 4).toUpperCase();
        const match = anneeText.match(/\d+/);
        const anneeCode = match ? match[0] : 'XX';

        matriculeInput.value = filiereCode + anneeCode + '-001';
    }

    filiereSelect.addEventListener('change', updateMatricule);
    anneeSelect.addEventListener('change', updateMatricule);

    // Envoi AJAX
    document.getElementById('enrolForm').onsubmit = async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);

        if (photoInput.value) {
            const res = await fetch(photoInput.value);
            const blob = await res.blob();
            formData.set('photo', blob, 'capture.jpg');
        }

        const response = await fetch("{% url 'attendance:capture' %}", {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: formData
        });

        const data = await response.json();
        alert(data.success ? data.message : data.error);
    };

});
</script>

{% endblock %}
